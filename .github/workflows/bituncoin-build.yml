name: Bituncoin Wallet Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: Bituncoin/wallet/package-lock.json

    - name: Install dependencies
      run: |
        cd Bituncoin/wallet
        npm ci

    - name: Build web app
      run: |
        cd Bituncoin/wallet
        npm run build

    - name: Upload web build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: bituncoin-wallet-web
        path: Bituncoin/wallet/build/

  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: Bituncoin/wallet/package-lock.json

    - name: Install dependencies
      run: |
        cd Bituncoin/wallet
        npm ci

    - name: Build Windows app
      run: |
        cd Bituncoin/wallet
        npm run build:win

    - name: Upload Windows build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: bituncoin-wallet-windows
        path: Bituncoin/wallet/dist/

  build-macos-intel:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: Bituncoin/wallet/package-lock.json

    - name: Install dependencies
      run: |
        cd Bituncoin/wallet
        npm ci

    - name: Build macOS Intel app
      run: |
        cd Bituncoin/wallet
        npm run build:mac-intel

    - name: Upload macOS Intel build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: bituncoin-wallet-macos-intel
        path: Bituncoin/wallet/dist/

  build-macos-arm:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: Bituncoin/wallet/package-lock.json

    - name: Install dependencies
      run: |
        cd Bituncoin/wallet
        npm ci

    - name: Build macOS ARM app
      run: |
        cd Bituncoin/wallet
        npm run build:mac-arm

    - name: Upload macOS ARM build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: bituncoin-wallet-macos-arm
        path: Bituncoin/wallet/dist/

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: Bituncoin/wallet/package-lock.json

    - name: Install dependencies
      run: |
        cd Bituncoin/wallet
        npm ci

    - name: Build Linux app
      run: |
        cd Bituncoin/wallet
        npm run build:linux

    - name: Upload Linux build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: bituncoin-wallet-linux
        path: Bituncoin/wallet/dist/

  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: Bituncoin/wallet/package-lock.json

    - name: Install dependencies
      run: |
        cd Bituncoin/wallet
        npm ci

    - name: Build Android app
      run: |
        cd Bituncoin/wallet
        npm run build:android

    - name: Upload Android build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: bituncoin-wallet-android
        path: Bituncoin/wallet/android/app/build/outputs/apk/

  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: Bituncoin/wallet/package-lock.json

    - name: Install dependencies
      run: |
        cd Bituncoin/wallet
        npm ci

    - name: Install CocoaPods
      run: |
        cd Bituncoin/wallet/ios
        pod install

    - name: Build iOS app
      run: |
        cd Bituncoin/wallet
        npm run build:ios

    - name: Upload iOS build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: bituncoin-wallet-ios
        path: Bituncoin/wallet/ios/build/

  release:
    needs: [build-web, build-windows, build-macos-intel, build-macos-arm, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download all build artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts/

    - name: Create GitHub release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}