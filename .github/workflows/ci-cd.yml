name: BTNG Gold System CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        cd contracts
        npm ci

    - name: Run linter
      run: |
        cd contracts
        npm run lint

    - name: Run tests
      run: |
        cd contracts
        npm run test

    - name: Generate coverage report
      run: |
        cd contracts
        npm run coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        directory: ./contracts/coverage
        flags: smart-contracts
        name: BTNG Gold Contracts

  frontend-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Build application
      run: npm run build

    - name: Run API tests
      run: |
        npm run dev &
        sleep 10
        curl -f http://localhost:3000/api/gold-coin || exit 1

  security-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Slither
      run: pip3 install slither-analyzer

    - name: Run Slither security analysis
      run: |
        cd contracts
        slither . --exclude-dependencies --exclude-informational

    - name: Run Mythril security analysis
      uses: mythril/mythril-action@v0.3.0
      with:
        contract-dir: contracts/
        args: --solc-json contracts/hardhat.config.js

  deploy-staging:
    needs: [test, frontend-test, security-audit]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm ci
        cd contracts && npm ci

    - name: Build frontend
      run: npm run build

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here
        # Example: rsync, docker push, etc.

  deploy-production:
    needs: [test, frontend-test, security-audit]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm ci
        cd contracts && npm ci

    - name: Build frontend
      run: npm run build

    - name: Compile contracts
      run: |
        cd contracts
        npm run compile

    - name: Run production tests
      run: |
        cd contracts
        npm run test

    - name: Deploy smart contracts
      run: |
        cd contracts
        # Add contract deployment to testnet/mainnet
        # npx hardhat run scripts/deploy.js --network mainnet

    - name: Deploy frontend
      run: |
        echo "Deploying frontend to production..."
        # Add your production deployment commands here
        # Example: Vercel, Netlify, AWS, etc.

    - name: Run health checks
      run: |
        echo "Running post-deployment health checks..."
        # Add health check commands
        # curl -f https://api.btng.africa/health || exit 1