name: BTNG Sovereign CI/CD

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [18.x, 20.x]

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm run test

            - name: Run linting
              run: npm run lint

            - name: Build btng-api
              run: npm run build --workspace=btng-api

            - name: Build genesis-app
              run: npm run build --workspace=genesis-app

            - name: Health check
              run: npm run health

    security-audit:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 20.x
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  cache: "npm"

            - name: Install dependencies
              run: npm install

            - name: Run security audit
              run: npm audit --audit-level high

    deploy-staging:
        needs: [test, security-audit]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        steps:
            - uses: actions/checkout@v4

            - name: Deploy to staging
              run: |
                  echo "Deploying to staging environment..."
                  # Add actual deployment commands here
                  # Example: rsync, docker push, etc.

    monitoring-alert:
        needs: deploy-staging
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        steps:
            - name: Send deployment alert
              run: |
                  curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
                    -H "Content-Type: application/json" \
                    -d '{
                      "content": "🚀 BTNG Sovereign Network deployed to staging\n✅ Tests passed\n✅ Security audit clean\n📊 Coverage: ${{ env.COVERAGE_PERCENTAGE }}%"
                    }'
