stages:
- test
- secret-detection
- deploy

variables:
  SECRET_DETECTION_ENABLED: 'true'
  # Increase timeout for long-running jobs
  GITLAB_CI_TIMEOUT: '30m'
  BTNG_API_TOKEN: "25c7347f-c329-4a77-bd4b-62751da8db6c"

sast:
  stage: test
  timeout: 20m
include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml

secret_detection:
  stage: secret-detection
  timeout: 15m

deploy_to_vps:
  stage: deploy
  timeout: 30m
  image: ubuntu:latest
  before_script:
    - apt-get update && apt-get install -y rsync openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $VPS_IP >> ~/.ssh/known_hosts
  script:
    # This sends only changed files to your VPS /var/www/btng folder
    - rsync -atv --delete ./ $VPS_USER@$VPS_IP:/var/www/btng/
    # This restarts your Node.js API on the VPS
    - ssh $VPS_USER@$VPS_IP "cd /var/www/btng && npm install && pm2 restart all"
  only:
    - main
