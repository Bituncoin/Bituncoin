apiVersion: apps/v1
kind: Deployment
metadata:
  name: btng-frontend
  namespace: btng-sovereign
  labels:
    app: btng-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: btng-frontend
  template:
    metadata:
      labels:
        app: btng-frontend
        component: frontend
    spec:
      containers:
      - name: btng-frontend
        image: btng-frontend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: btng-config
              key: NODE_ENV
        - name: NEXT_PUBLIC_BTNG_API_URL
          valueFrom:
            configMapKeyRef:
              name: btng-config
              key: NEXT_PUBLIC_BTNG_API_URL
        - name: NEXT_PUBLIC_BTNG_NETWORK
          valueFrom:
            configMapKeyRef:
              name: btng-config
              key: NEXT_PUBLIC_BTNG_NETWORK
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"