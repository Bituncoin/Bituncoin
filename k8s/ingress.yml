apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: btng-ingress
  namespace: btng-sovereign
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.btng-sovereign.com
    - app.btng-sovereign.com
    secretName: btng-tls
  rules:
  - host: api.btng-sovereign.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: btng-sdk
            port:
              number: 8080
  - host: app.btng-sovereign.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: btng-frontend
            port:
              number: 3000