apiVersion: v1
kind: Service
metadata:
  name: btng-sdk
  namespace: btng-sovereign
  labels:
    app: btng-sdk
    component: backend
spec:
  selector:
    app: btng-sdk
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: btng-frontend
  namespace: btng-sovereign
  labels:
    app: btng-frontend
    component: frontend
spec:
  selector:
    app: btng-frontend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  type: ClusterIP