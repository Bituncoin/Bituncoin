global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'btng-sdk'
    static_configs:
      - targets: ['btng-sdk:8080']
    scrape_interval: 5s
    metrics_path: '/metrics'

  - job_name: 'btng-frontend'
    static_configs:
      - targets: ['btng-frontend:3000']
    scrape_interval: 10s
    metrics_path: '/api/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s